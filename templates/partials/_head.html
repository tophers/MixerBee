<head>
    <meta charset="utf-8">
    <title>MixerBee</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/css/main.css">
    <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
    <style>
        .automation-config-card {
            background: rgba(0,0,0,0.2);
            border-radius: var(--radius-md);
            padding: 1.25rem;
            margin-top: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .w-80 { width: 80px !important; }
        .text-center { text-align: center; }
        [x-cloak] { display: none !important; }
        
        .flex-basis-sync {
            flex: 1 1 160px !important;
        }

        .job-row-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem !important;
            gap: 1rem;
        }

        .job-title-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .compact-block {
            margin-bottom: 0.75rem !important;
        }

        .job-icon-status {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            flex-shrink: 0;
        }

        .badge-align {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 20px;
            padding-top: 0;
            padding-bottom: 0;
            line-height: 1;
        }

        /* AI Tweak Modal Styles */
        .tweak-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.25rem;
        }
        .tweak-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .tweak-label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tweak-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text);
        }
        .tweak-value {
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--accent);
            background: rgba(var(--accent-rgb), 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }
        .tweak-description {
            font-size: 0.75rem;
            color: var(--text-subtle);
            line-height: 1.3;
        }

        /* Danger Zone Styles for Maintenance */
        .danger-zone {
            border: 1px solid rgba(var(--danger-rgb), 0.2) !important;
            background: rgba(var(--danger-rgb), 0.03);
        }
        .danger-zone legend {
            color: var(--danger);
            opacity: 0.8;
            font-weight: bold;
        }
        .btn-danger-outline {
            border: 1px solid rgba(var(--danger-rgb), 0.3) !important;
            color: var(--danger) !important;
            background: transparent !important;
        }
        .btn-danger-outline:hover {
            background: var(--danger) !important;
            color: white !important;
        }
    </style>
