<!-- templates/partials/_block_header.html -->
<summary>
    <div class="mixed-block-header">
        <button type="button" class="icon-btn drag-handle block-drag-handle" x-sort:handle x-html="$store.icons.move"></button>
        <h3 class="flex-row align-center gap-xs">
            <template x-if="block.is_ai_generated || block.type === 'vibe'">
                <span class="ai-badge-icon" :class="block.type === 'vibe' ? 'pulse-icon' : ''" x-html="$store.icons.zap"></span>
            </template>
            
            <span x-text="block.title || (block.type === 'vibe' ? (block.vibe_type === 'tv' ? 'TV Vibes' : 'Movie Vibes') : '{{ default_title }}')"></span>
            
            <template x-if="block.isSnapshot">
                <span class="color-accent ml-xs" title="Order Fixed (Snapshotted)" x-html="$store.icons.lock" style="--icon-size: 14px; opacity: 0.8;"></span>
            </template>

            <span x-show="!isOpen" 
                  class="badge badge-outline-subtle ml-sm" 
                  style="font-size: 0.7rem; opacity: 0.8;"
                  x-text="(block._previewCount ?? 0) + ' Matches'">
            </span>
        </h3>

        <div class="mixed-block-controls dropdown-container" x-data="{ menuOpen: false }">
            <button type="button" class="icon-btn" @click.prevent="menuOpen = !menuOpen" @click.outside="menuOpen = false" x-html="$store.icons.more"></button>
            <div class="dropdown-menu z-dropdown" x-show="menuOpen" x-cloak style="right: 0; left: auto; top: 100%;">
                <a href="#" class="dropdown-item" @click.prevent="menuOpen = false; $store.mixer.duplicateBlock(index)">
                    <span class="dropdown-icon" x-html="$store.icons.copy"></span> Duplicate
                </a>
                <a href="#" class="dropdown-item" @click.prevent="menuOpen = false; $store.mixer.deleteBlock(index)" style="color: var(--danger);">
                    <span class="dropdown-icon" x-html="$store.icons.trash"></span> Delete
                </a>
            </div>
            <span class="icon-btn collapse-toggle-btn modal-header-actions" x-html="$store.icons.chevronUp"></span>
        </div>
    </div>
</summary>
