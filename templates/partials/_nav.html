<!-- templates/partials/_nav.html -->
<div class="main-header-bar">
    <div class="header-user-display">
        <button id="settings-btn" type="button" class="icon-btn" title="Settings" @click="$store.settings.show()">
            <span x-html="$store.icons.settings"></span>
        </button>
    </div>
</div>

<div id="typewriter-overlay">
    <div class="typewriter-wrapper">
        <h2 class="typewriter-header">
            <span id="typed-text"></span>
        </h2>
    </div>
</div>

<div class="tab-switcher">
    <button class="tab-btn" :class="{ 'active': $store.ui.currentTab === 'mixed' }" @click="$store.ui.setTab('mixed')">Builder</button>
    <button class="tab-btn" :class="{ 'active': $store.ui.currentTab === 'scheduler' }" @click="$store.ui.setTab('scheduler')">Scheduler</button>
    <button class="tab-btn" :class="{ 'active': $store.ui.currentTab === 'manager' }" @click="$store.ui.setTab('manager')">Manager</button>
</div>
