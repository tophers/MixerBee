<!-- templates/partials/_manager_pane.html -->
<div id="manager-pane">
    <div class="container">
        <div class="flex-row justify-between align-center gap-md mb-sm flex-wrap">
            <div class="flex-row gap-md grow-1 align-center">
                <input type="search" placeholder="Search by name..."
                       x-model="$store.manager.searchQuery"
                       @input.debounce.250ms="$store.manager.applyFilters()"
                       class="grow-1 m-0">
            </div>
        </div>
        <div class="toggle-pill m-0 shrink-0">
            <span class="pill-btn" :class="$store.manager.viewFilter === 'All' ? 'active' : ''" @click="$store.manager.viewFilter = 'All'; $store.manager.applyFilters()">All</span>
            <span class="pill-btn" :class="$store.manager.viewFilter === 'Playlist' ? 'active' : ''" @click="$store.manager.viewFilter = 'Playlist'; $store.manager.applyFilters()">Playlists</span>
            <span class="pill-btn" :class="$store.manager.viewFilter === 'Collection' ? 'active' : ''" @click="$store.manager.viewFilter = 'Collection'; $store.manager.applyFilters()">Collections</span>
        </div>
        <div class="table-container card">
            <table class="manager-table w-full">
                <thead>
                    <tr class="table-header-row">
                        <th @click="$store.manager.toggleSort('Name')" class="table-cell pointer text-left select-none">
                            <div class="flex-row align-center gap-xs">
                                Name
                                <span x-show="$store.manager.sortColumn === 'Name'" x-html="$store.manager.sortDirection === 'asc' ? $store.icons.chevronUp : $store.icons.chevronDown" style="--icon-size: 14px; opacity: 0.7;" x-cloak></span>
                            </div>
                        </th>
                        <th @click="$store.manager.toggleSort('DisplayType')" class="table-cell pointer text-left select-none">
                            <div class="flex-row align-center gap-xs">
                                Type
                                <span x-show="$store.manager.sortColumn === 'DisplayType'" x-html="$store.manager.sortDirection === 'asc' ? $store.icons.chevronUp : $store.icons.chevronDown" style="--icon-size: 14px; opacity: 0.7;" x-cloak></span>
                            </div>
                        </th>
                        <th @click="$store.manager.toggleSort('ChildCount')" class="table-cell pointer text-center select-none">
                            <div class="flex-row align-center justify-center gap-xs">
                                Items
                                <span x-show="$store.manager.sortColumn === 'ChildCount'" x-html="$store.manager.sortDirection === 'asc' ? $store.icons.chevronUp : $store.icons.chevronDown" style="--icon-size: 14px; opacity: 0.7;" x-cloak></span>
                            </div>
                        </th>
                        <th class="table-cell text-right">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-if="!$store.manager.isLoading && ($store.manager.filtered || []).length === 0">
                        <tr><td colspan="4" class="table-loading">No items found.</td></tr>
                    </template>
                    <template x-for="item in ($store.manager.filtered || [])" :key="item.Id">
                        <tr class="table-row">
                            <td class="table-cell bold clickable" x-text="item.Name" @click="$store.manager.viewContents(item)"></td>
                            <td class="table-cell">
                                <span class="token-badge"
                                      :class="item.DisplayType === 'Playlist' ? 'badge-accent' : 'badge-outline'"
                                      x-text="item.DisplayType"></span>
                            </td>
                            <td class="table-cell text-center" x-text="item.ChildCount"></td>
                            <td class="table-cell text-right">
                                <div class="flex-row justify-end gap-sm">
                                    <button type="button"
                                            class="secondary small icon-only"
                                            @click="$store.manager.viewContents(item)"
                                            title="View Contents"
                                            x-html="$store.icons.eye"></button>
                                    <button type="button"
                                            class="secondary small icon-only"
                                            @click="$store.manager.convertItem(item)"
                                            title="Convert Type"
                                            x-html="$store.icons.refresh"></button>
                                    <button type="button"
                                            class="secondary small icon-only danger-hover"
                                            @click="$store.manager.deleteItem(item)"
                                            title="Delete Entire List"
                                            x-html="$store.icons.trash"></button>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div class="flex-row items-baseline gap-sm mt-md">
            <span class="badge badge-accent-light align-center gap-xs" title="Library IQ: The percentage of your library tagged by AI for Mood Searches.">
                <span x-html="$store.icons.zap"></span>
                <span x-text="'Library IQ: ' + $store.manager.libraryIq.percentage + '% (' + $store.manager.libraryIq.enriched + ' / ' + $store.manager.libraryIq.total + ')'"></span>
            </span>
        </div>
    </div>
</div>
