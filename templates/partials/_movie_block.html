<template x-if="block && block.type === 'movie'">
    <div x-data="{
        filterModalOpen: false,
        genreQuery: '',
        genreSuggestions: [],
        personQuery: '',
        personSuggestions: [],
        personRole: 'Person'
    }"
    x-init="$store.mixer.ensureBlockState(block)">
        <details class="mixed-block" :open="index === $store.mixer.blocks.length - 1">
            <summary>
                <div class="mixed-block-header">
                    <button type="button" class="icon-btn drag-handle" title="Drag to reorder"><i data-feather="move"></i></button>
                    <h3>
                        <template x-if="block.is_ai_generated">
                            <i data-feather="zap" class="ai-badge-icon"></i>
                        </template>
                        <span x-text="block.title || 'Movie Block'"></span>
                    </h3>

                    <div class="mixed-block-controls dropdown-container" x-data="{ menuOpen: false }">
                        <button type="button" class="icon-btn" @click.prevent="menuOpen = !menuOpen" @click.outside="menuOpen = false">
                            <i data-feather="more-vertical"></i>
                        </button>
                        <div class="dropdown-menu" x-show="menuOpen" x-cloak style="right: 0; left: auto; top: 100%; z-index: 10;">
                            <a href="#" class="dropdown-item" @click.prevent="menuOpen = false; $store.mixer.duplicateBlock(index)"><i data-feather="copy"></i> Duplicate</a>
                            <a href="#" class="dropdown-item" @click.prevent="menuOpen = false; $store.mixer.deleteBlock(index)" style="color: var(--danger);"><i data-feather="trash-2"></i> Delete</a>
                        </div>
                        <span class="icon-btn collapse-toggle-btn" style="margin-left: 0.5rem;"><i data-feather="chevron-up"></i></span>
                    </div>
                </div>
            </summary>

            <div class="mixed-block-body">
                <div class="block-summary-card">
                    <div class="flex-row justify-between align-start flex-wrap gap-md">
                        <div class="grow-1">
                            <div class="summary-label">Selection Preview</div>

                            <div class="summary-content mb-sm">
                                <template x-if="block._previewItems?.length">
                                    <div>
                                        <template x-for="(item, i) in block._previewItems" :key="i">
                                            <span x-text="item.name + (i < block._previewItems.length - 1 ? ', ' : '')"></span>
                                        </template>
                                        <template x-if="block._previewCount > 3">
                                            <span style="color: var(--text-subtle);"> + <span x-text="block._previewCount - 3"></span> more</span>
                                        </template>
                                    </div>
                                </template>
                            </div>

                            <div class="flex-row flex-wrap gap-sm align-center">
                                <span class="badge" :class="block.filters.watched_status" x-show="block.filters.watched_status !== 'all'" x-text="block.filters.watched_status.toUpperCase()"></span>
                                <span class="badge" x-show="block.filters.year_from > 1920 || block.filters.year_to < new Date().getFullYear()"
                                      x-text="block.filters.year_from + ' - ' + block.filters.year_to"></span>

                                <!-- Added Library Preview Badges -->
                                <template x-for="libId in block.filters.parent_ids" :key="libId">
                                    <span class="badge" style="border: 1px solid var(--border-color); color: var(--text-subtle); opacity: 0.8;"
                                          x-text="$store.mixer.library.libraryData.find(l => l.Id === libId)?.Name"></span>
                                </template>

                                <template x-for="g in (block.filters.genres_any || []).slice(0, 3)" :key="g">
                                    <span class="badge" style="background: rgba(var(--accent-rgb), 0.15); color: var(--accent); border: 1px solid var(--accent)" x-text="g"></span>
                                </template>

                                <template x-for="p in (block.filters.people || []).slice(0, 2)" :key="p.Id">
                                    <span class="badge" style="border: 1px solid var(--border-color);" x-text="p.Name"></span>
                                </template>

                                <template x-for="s in (block.filters.studios || []).slice(0, 2)" :key="s">
                                    <span class="badge" style="border: 1px solid var(--border-color); font-style: italic;" x-text="s"></span>
                                </template>
                            </div>
                        </div>

                        <div class="text-right" style="min-width: 100px;">
                            <div class="summary-label">Matches</div>
                            <div style="font-size: 1.4rem; font-weight: 700; color: var(--accent);" x-text="block._previewLoading ? '...' : block._previewCount"></div>
                        </div>
                    </div>

                    <div class="mt-md" style="border-top: 1px solid rgba(255,255,255,0.05); padding-top: 0.8rem; display: flex; justify-content: flex-end; gap: 0.5rem;">
                        <button type="button" class="secondary small" @click="$store.mixer.previewPlaylist($el, [block])">
                            <i data-feather="list" class="small-icon"></i> Preview Block
                        </button>
                        <button type="button" class="secondary small" @click="filterModalOpen = true">
                            <i data-feather="sliders" class="small-icon"></i> Edit Filters
                        </button>
                    </div>
                </div>

                <div class="modal-overlay" x-show="filterModalOpen" x-cloak style="z-index: 4000; position: fixed;">
                    <div class="modal-window wide" @click.outside="filterModalOpen = false">
                        <div class="modal-header">
                            <h2>Movie Filters</h2>
                            <button type="button" class="icon-btn" @click="filterModalOpen = false">&times;</button>
                        </div>

                        <div class="modal-body" style="overflow-y: auto; max-height: 70vh;">
                            <fieldset class="filter-group">
                                <legend>Libraries</legend>
                                <div class="flex-row flex-wrap gap-xs">
                                    <template x-for="lib in $store.mixer.library.libraryData" :key="lib.Id">
                                        <button type="button" 
                                                class="pill-btn" 
                                                style="padding: 6px 12px; font-size: 0.85rem;"
                                                :class="block.filters.parent_ids.includes(lib.Id) ? 'active' : ''"
                                                @click="
                                                    if(block.filters.parent_ids.includes(lib.Id)) {
                                                        block.filters.parent_ids = block.filters.parent_ids.filter(id => id !== lib.Id)
                                                    } else {
                                                        block.filters.parent_ids.push(lib.Id)
                                                    };
                                                    $store.mixer.updatePreviewCount(block);
                                                "
                                                x-text="lib.Name">
                                        </button>
                                    </template>
                                </div>
                            </fieldset>

                            <fieldset class="filter-group">
                                <legend>Cast, Crew & Studios</legend>
                                <div class="flex-row gap-sm mb-md">
                                    <select x-model="personRole" style="width: auto;"><option value="Person">Any Role</option><option value="Actor">Actor</option><option value="Director">Director</option></select>
                                    <div class="token-field-wrapper grow-1">
                                        <input type="search" class="token-input" placeholder="Search people or studios..."
                                               x-model="personQuery"
                                               @input.debounce.300ms="personSuggestions = await $store.mixer.fetchSuggestions('person', personQuery)">
                                        <div class="autocomplete-suggestions" x-show="personSuggestions.length > 0" x-cloak>
                                            <ul>
                                                <template x-for="s in personSuggestions" :key="s.data.Id || s.text">
                                                    <li @click="$store.mixer.addToken(block, s.type, s.data, personRole); personQuery = ''; personSuggestions = []" x-text="s.text"></li>
                                                </template>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                                <div class="token-container">
                                    <template x-for="(p, i) in block.filters.people" :key="'p'+i">
                                        <span class="token"><span class="token-state" @click="$store.mixer.cycleTokenState(block, 'people', i)">⊕</span> <span x-text="p.Name"></span> <b class="token-remove" @click="$store.mixer.removeToken(block, 'people', i)">&times;</b></span>
                                    </template>
                                    <template x-for="(p, i) in block.filters.exclude_people" :key="'ep'+i">
                                        <span class="token" style="border-color: var(--danger);"><span class="token-state" @click="$store.mixer.cycleTokenState(block, 'exclude_people', i)">⊖</span> <span x-text="p.Name"></span> <b class="token-remove" @click="$store.mixer.removeToken(block, 'exclude_people', i)">&times;</b></span>
                                    </template>
                                    <template x-for="(s, i) in block.filters.studios" :key="'s'+i">
                                        <span class="token" style="background: rgba(var(--accent-rgb), 0.1);"><span class="token-state" @click="$store.mixer.cycleTokenState(block, 'studios', i)">⊕</span> <span x-text="s"></span> <b class="token-remove" @click="$store.mixer.removeToken(block, 'studios', i)">&times;</b></span>
                                    </template>
                                    <template x-for="(s, i) in block.filters.exclude_studios" :key="'es'+i">
                                        <span class="token" style="border-color: var(--danger);"><span class="token-state" @click="$store.mixer.cycleTokenState(block, 'exclude_studios', i)">⊖</span> <span x-text="s"></span> <b class="token-remove" @click="$store.mixer.removeToken(block, 'exclude_studios', i)">&times;</b></span>
                                    </template>
                                </div>
                            </fieldset>

                            <fieldset class="filter-group">
                                <legend>Genres</legend>
                                <div class="token-field-wrapper">
                                    <input type="search" class="token-input" placeholder="Search genres..."
                                            x-model="genreQuery"
                                            @input.debounce.300ms="genreSuggestions = await $store.mixer.fetchSuggestions('genre', genreQuery)">
                                    <div class="autocomplete-suggestions" x-show="genreSuggestions.length > 0" x-cloak>
                                        <ul>
                                            <template x-for="s in genreSuggestions" :key="s.text">
                                                <li @click="$store.mixer.addToken(block, 'genre', s.data); genreQuery = ''; genreSuggestions = []" x-text="s.text"></li>
                                            </template>
                                        </ul>
                                    </div>
                                </div>
                                <div class="token-container mt-sm">
                                    <template x-for="(g, i) in block.filters.genres_any" :key="'any'+i"><span class="token"><span class="token-state" @click="$store.mixer.cycleTokenState(block, 'genres_any', i)">⊕</span> <span x-text="g"></span> <b class="token-remove" @click="$store.mixer.removeToken(block, 'genres_any', i)">&times;</b></span></template>
                                    <template x-for="(g, i) in block.filters.genres_all" :key="'all'+i"><span class="token"><span class="token-state" @click="$store.mixer.cycleTokenState(block, 'genres_all', i)">✓</span> <span x-text="g"></span> <b class="token-remove" @click="$store.mixer.removeToken(block, 'genres_all', i)">&times;</b></span></template>
                                    <template x-for="(g, i) in block.filters.genres_exclude" :key="'ex'+i"><span class="token"><span class="token-state" @click="$store.mixer.cycleTokenState(block, 'genres_exclude', i)">⊖</span> <span x-text="g"></span> <b class="token-remove" @click="$store.mixer.removeToken(block, 'genres_exclude', i)">&times;</b></span></template>
                                </div>
                            </fieldset>

                            <fieldset class="filter-group">
                                <legend>Settings & Years</legend>
                                <div class="movie-block-filter-grid">
                                    <button type="button" class="filter-toggle-btn" @click="const c = {all:'unplayed', unplayed:'played', played:'all'}; block.filters.watched_status = c[block.filters.watched_status || 'all']; $store.mixer.updatePreviewCount(block)">
                                        <i :data-feather="block.filters.watched_status === 'unplayed' ? 'eye-off' : 'eye'"></i> <span x-text="block.filters.watched_status === 'unplayed' ? 'Unplayed' : (block.filters.watched_status === 'played' ? 'Played' : 'All Movies')"></span>
                                    </button>
                                    <button type="button" class="filter-toggle-btn" @click="const c = {Random:'PremiereDate', PremiereDate:'DateCreated', DateCreated:'SortName', SortName:'Random'}; block.filters.sort_by = c[block.filters.sort_by || 'Random']; $store.mixer.updatePreviewCount(block)">
                                        <i :data-feather="block.filters.sort_by === 'PremiereDate' ? 'calendar' : 'shuffle'"></i> <span x-text="'Sort: ' + block.filters.sort_by"></span>
                                    </button>
                                    <div class="range-slider-wrapper col-span-2">
                                        <div class="range-slider-display" x-text="block.filters.year_from + ' - ' + block.filters.year_to"></div>
                                        <div class="range-slider-container">
                                            <div class="range-slider-track"></div>
                                            <div class="range-slider-progress" :style="`left: ${((block.filters.year_from - 1920) / (new Date().getFullYear() - 1920)) * 100}%; width: ${((block.filters.year_to - block.filters.year_from) / (new Date().getFullYear() - 1920)) * 100}%`"></div>
                                            <input type="range" min="1920" :max="new Date().getFullYear()" x-model.number="block.filters.year_from" @input.debounce.500ms="$store.mixer.updatePreviewCount(block)">
                                            <input type="range" min="1920" :max="new Date().getFullYear()" x-model.number="block.filters.year_to" @input.debounce.500ms="$store.mixer.updatePreviewCount(block)">
                                        </div>
                                    </div>
                                </div>
                            </fieldset>
                        </div>
                        <div class="modal-footer"><button type="button" @click="filterModalOpen = false" class="primary">Done</button></div>
                    </div>
                </div>
            </div>
        </details>
    </div>
</template>
