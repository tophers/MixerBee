<!-- templates/partials/_movie_block.html -->
<template x-if="block && block.type === 'movie'">
    <div x-data="{
        filterModalOpen: false,
        isOpen: index === $store.mixer.blocks.length - 1,
        genreQuery: '',
        genreSuggestions: [],
        personQuery: '',
        personSuggestions: [],
        personRole: 'Person',
        relativeDateCustom: false,

        getPreviewCount() {
            if (block._previewLoading) return '...';
            return block._previewCount ?? '0';
        },

        cycleWatchedStatus() {
            if (!block.filters) block.filters = {};
            const statusMap = { 'all': 'unplayed', 'unplayed': 'played', 'played': 'all' };
            block.filters.watched_status = statusMap[block.filters.watched_status || 'all'];
            $store.mixer.updatePreviewCount(block);
        },

        cycleSort() {
            if (!block.filters) block.filters = {};
            const sortMap = { 'Random': 'PremiereDate', 'PremiereDate': 'DateCreated', 'DateCreated': 'SortName', 'SortName': 'Random' };
            block.filters.sort_by = sortMap[block.filters.sort_by || 'Random'];
            $store.mixer.updatePreviewCount(block);
        },

        getRelativeDateLabel() {
            const days = block.filters?.release_within_days;
            if (!days || days == 0) return '';
            if (days == 30) return 'Last 30 Days';
            if (days == 90) return 'Last 90 Days';
            if (days == 180) return 'Last 6 Months';
            if (days == 365) return 'Last 12 Months';
            if (days == 730) return 'Last 2 Years';
            return 'Last ' + days + ' Days';
        }
    }"
    x-init="$store.mixer.ensureBlockState(block); if(block.filters?.release_within_days && ![0,30,90,180,365,730].includes(parseInt(block.filters.release_within_days))) relativeDateCustom = true;">

        <details class="mixed-block" :open="isOpen" @toggle="isOpen = $el.open">
            {% set default_title = 'Movie Block' %}
            {% include 'partials/_block_header.html' %}

            <div class="mixed-block-body">
                <div class="block-summary-card">
                    <div class="flex-row align-start gap-lg">
                        <div class="shrink-0 curated-stat-box">
                            <div class="summary-label">Matches</div>
                            <div class="curated-count" x-text="getPreviewCount()"></div>
                        </div>

                        <div class="grow-1">
                            <div class="summary-label">Selection Preview</div>
                            <div class="summary-content mb-sm">
                                <template x-if="block._previewItems && block._previewItems.length > 0">
                                    <div class="curated-preview-text">
                                        <template x-for="(item, i) in block._previewItems.slice(0, 3)" :key="block._uid + '_prev_' + i">
                                            <span x-text="(item.name || item.Name || 'Unknown') + (i < Math.min(block._previewItems.length, 3) - 1 ? ', ' : '')"></span>
                                        </template>
                                        <template x-if="block._previewCount > 3">
                                            <span class="text-subtle"> + <span x-text="block._previewCount - 3"></span> more</span>
                                        </template>
                                    </div>
                                </template>
                                <template x-if="!block._previewItems || block._previewItems.length === 0">
                                    <div class="text-subtle italic">No items matched these filters</div>
                                </template>
                            </div>

                            <div class="flex-row flex-wrap gap-sm align-center">
                                <template x-if="block.filters && block.filters.watched_status && block.filters.watched_status !== 'all'">
                                    <span class="badge" :class="block.filters.watched_status" x-text="block.filters.watched_status.toUpperCase()"></span>
                                </template>
                                <template x-if="block.filters && block.filters.release_within_days > 0">
                                    <span class="badge badge-accent" x-text="getRelativeDateLabel()"></span>
                                </template>
                                <template x-if="block.filters && (!block.filters.release_within_days || block.filters.release_within_days == 0) && (block.filters.year_from > 1920 || block.filters.year_to < new Date().getFullYear())">
                                    <span class="badge" x-text="block.filters.year_from + ' - ' + block.filters.year_to"></span>
                                </template>
                                <template x-for="libId in (block.filters?.parent_ids || [])" :key="block._uid + '_lib_badge_' + libId">
                                    <span class="badge badge-outline-subtle" x-text="$store.mixer.library.libraryData.find(l => l.Id === libId)?.Name || 'Library'"></span>
                                </template>
                            </div>
                        </div>
                    </div>

                    <div class="mt-md curated-footer">
                        <button type="button" class="secondary small align-center gap-xs" @click="$store.mixer.previewPlaylist($el, [block])">
                            <span x-html="$store.icons.list"></span> Preview Block
                        </button>
                        <button type="button" class="secondary small align-center gap-xs" @click="filterModalOpen = true">
                            <span x-html="$store.icons.sliders"></span> Edit Filters
                        </button>
                    </div>
                </div>
            </div>
        </details>

        <div class="modal-overlay" x-show="filterModalOpen" x-cloak>
            <div class="modal-window wide" @click.outside="filterModalOpen = false">
                <div class="modal-header">
                    <h2 x-text="(block.title || 'Movie') + ' Filters'"></h2>
                    <button type="button" class="icon-btn" @click="filterModalOpen = false">&times;</button>
                </div>

                <div class="modal-body modal-body-scroll">
                    <div class="flex-row align-center gap-md filter-logic-help">
                        <span class="text-subtle bold opacity-80 uppercase">Logic Key:</span>
                        <div class="flex-row gap-md curated-preview-text">
                            <span class="flex-row align-center gap-xs" style="color: var(--accent);"><b class="token-state-trigger">⊕</b> Any (OR)</span>
                            <span class="flex-row align-center gap-xs" style="color: var(--success);"><b class="token-state-trigger">✓</b> All (AND)</span>
                            <span class="flex-row align-center gap-xs" style="color: var(--danger);"><b class="token-state-trigger">⊖</b> Exclude (NOT)</span>
                        </div>
                    </div>

                    <fieldset class="filter-group">
                        <legend>Cast, Crew & Studios</legend>
                        <div class="flex-row gap-sm mb-md">
                            <select x-model="personRole" class="w-auto"><option value="Person">Any Role</option><option value="Actor">Actor</option><option value="Director">Director</option></select>
                            <div class="token-field-wrapper grow-1">
                                <input type="search" class="token-input" placeholder="Search people or studios..." x-model="personQuery" @input.debounce.300ms="personSuggestions = await $store.mixer.fetchSuggestions('person', personQuery)">
                                <div class="autocomplete-suggestions" x-show="personSuggestions.length > 0" x-cloak>
                                    <ul>
                                        <template x-for="s in personSuggestions" :key="block._uid + '_p_sug_' + s.text">
                                            <li @click="$store.mixer.addToken(block, s.type, s.data, personRole); personQuery = ''; personSuggestions = []" x-text="s.text"></li>
                                        </template>
                                    </ul>
                                </div>
                            </div>
                        </div>
                        <div class="token-container">
                            <template x-for="p in (block.filters?.people || [])" :key="block._uid + '_tany_' + (p.Id || p.Name)">
                                <span class="token token-logic-any" @click="$store.mixer.cycleTokenState(block, 'people', p)">
                                    <span class="token-state-trigger">⊕</span>
                                    <span class="token-label" x-text="p.Name || p.name"></span>
                                    <b class="token-remove" @click.stop="$store.mixer.removeToken(block, 'people', block.filters.people.indexOf(p))">&times;</b>
                                </span>
                            </template>
                            <template x-for="p in (block.filters?.people_all || [])" :key="block._uid + '_tall_' + (p.Id || p.Name)">
                                <span class="token token-logic-all" @click="$store.mixer.cycleTokenState(block, 'people_all', p)">
                                    <span class="token-state-trigger">✓</span>
                                    <span class="token-label" x-text="p.Name || p.name"></span>
                                    <b class="token-remove" @click.stop="$store.mixer.removeToken(block, 'people_all', block.filters.people_all.indexOf(p))">&times;</b>
                                </span>
                            </template>
                            <template x-for="p in (block.filters?.exclude_people || [])" :key="block._uid + '_tex_' + (p.Id || p.Name)">
                                <span class="token token-logic-exclude" @click="$store.mixer.cycleTokenState(block, 'exclude_people', p)">
                                    <span class="token-state-trigger">⊖</span>
                                    <span class="token-label" x-text="p.Name || p.name"></span>
                                    <b class="token-remove" @click.stop="$store.mixer.removeToken(block, 'exclude_people', block.filters.exclude_people.indexOf(p))">&times;</b>
                                </span>
                            </template>
                            <template x-for="s in (block.filters?.studios || [])" :key="block._uid + '_stany_' + s">
                                <span class="token token-logic-any" @click="$store.mixer.cycleTokenState(block, 'studios', s)">
                                    <span class="token-state-trigger">⊕</span>
                                    <span class="token-label" x-text="s"></span>
                                    <b class="token-remove" @click.stop="$store.mixer.removeToken(block, 'studios', block.filters.studios.indexOf(s))">&times;</b>
                                </span>
                            </template>
                            <template x-for="s in (block.filters?.exclude_studios || [])" :key="block._uid + '_stex_' + s">
                                <span class="token token-logic-exclude" @click="$store.mixer.cycleTokenState(block, 'exclude_studios', s)">
                                    <span class="token-state-trigger">⊖</span>
                                    <span class="token-label" x-text="s"></span>
                                    <b class="token-remove" @click.stop="$store.mixer.removeToken(block, 'exclude_studios', block.filters.exclude_studios.indexOf(s))">&times;</b>
                                </span>
                            </template>
                        </div>
                    </fieldset>

                    <fieldset class="filter-group">
                        <legend>Genres</legend>
                        <div class="token-field-wrapper">
                            <input type="search" class="token-input" placeholder="Search genres..." x-model="genreQuery" @input.debounce.300ms="genreSuggestions = await $store.mixer.fetchSuggestions('genre', genreQuery)">
                            <div class="autocomplete-suggestions" x-show="genreSuggestions.length > 0" x-cloak>
                                <ul>
                                    <template x-for="s in genreSuggestions" :key="block._uid + '_g_sug_' + s.text">
                                        <li @click="$store.mixer.addToken(block, 'genre', s.data); genreQuery = ''; genreSuggestions = []" x-text="s.text"></li>
                                    </template>
                                </ul>
                            </div>
                        </div>
                        <div class="token-container mt-sm">
                            <template x-for="g in (block.filters?.genres_any || [])" :key="block._uid + '_ga_' + g">
                                <span class="token token-logic-any" @click="$store.mixer.cycleTokenState(block, 'genres_any', g)">
                                    <span class="token-state-trigger">⊕</span>
                                    <span class="token-label" x-text="g"></span>
                                    <b class="token-remove" @click.stop="$store.mixer.removeToken(block, 'genres_any', block.filters.genres_any.indexOf(g))">&times;</b>
                                </span>
                            </template>
                            <template x-for="g in (block.filters?.genres_all || [])" :key="block._uid + '_gall_' + g">
                                <span class="token token-logic-all" @click="$store.mixer.cycleTokenState(block, 'genres_all', g)">
                                    <span class="token-state-trigger">✓</span>
                                    <span class="token-label" x-text="g"></span>
                                    <b class="token-remove" @click.stop="$store.mixer.removeToken(block, 'genres_all', block.filters.genres_all.indexOf(g))">&times;</b>
                                </span>
                            </template>
                            <template x-for="g in (block.filters?.genres_exclude || [])" :key="block._uid + '_gex_' + g">
                                <span class="token token-logic-exclude" @click="$store.mixer.cycleTokenState(block, 'genres_exclude', g)">
                                    <span class="token-state-trigger">⊖</span>
                                    <span class="token-label" x-text="g"></span>
                                    <b class="token-remove" @click.stop="$store.mixer.removeToken(block, 'genres_exclude', block.filters.genres_exclude.indexOf(g))">&times;</b>
                                </span>
                            </template>
                        </div>
                    </fieldset>

                    <fieldset class="filter-group">
                        <legend>Release Date & Libraries</legend>
                        <div class="flex-column gap-md mb-md">
                            <div class="flex-row align-center gap-md flex-wrap">
                                <label class="field-label m-0">Release within:</label>
                                <select x-model.number="block.filters.release_within_days" 
                                        class="w-auto m-0"
                                        @change="if($el.value != -1) { relativeDateCustom = false; $store.mixer.updatePreviewCount(block); } else { relativeDateCustom = true; }">
                                    <option value="0">All Time (Use Year Range)</option>
                                    <option value="30">Last 30 Days</option>
                                    <option value="90">Last 90 Days</option>
                                    <option value="180">Last 6 Months</option>
                                    <option value="365">Last 12 Months</option>
                                    <option value="730">Last 2 Years</option>
                                    <option value="-1">Custom Days...</option>
                                </select>
                                <div x-show="relativeDateCustom" x-cloak class="flex-row align-center gap-xs">
                                    <input type="number" x-model.number="block.filters.release_within_days" 
                                           min="1" class="themed-input w-80 text-center m-0"
                                           @input.debounce.500ms="$store.mixer.updatePreviewCount(block)">
                                    <span class="text-subtle">Days</span>
                                </div>
                            </div>
                        </div>

                        <div class="range-slider-wrapper mb-md" :class="block.filters.release_within_days > 0 ? 'opacity-30 pointer-none' : ''">
                            <div class="flex-row justify-between align-center mb-xs">
                                <label class="field-label m-0">Year Range</label>
                                <div class="range-slider-display" x-text="(block.filters?.year_from || 1920) + ' - ' + (block.filters?.year_to || 2025)"></div>
                            </div>
                            <div class="range-slider-container">
                                <div class="range-slider-track"></div>
                                <div class="range-slider-progress" :style="`left: ${(((block.filters?.year_from || 1920) - 1920) / (new Date().getFullYear() - 1920)) * 100}%; width: ${(((block.filters?.year_to || 2025) - (block.filters?.year_from || 1920)) / (new Date().getFullYear() - 1920)) * 100}%`"></div>
                                <input type="range" min="1920" :max="new Date().getFullYear()" x-model.number="block.filters.year_from" @input.debounce.500ms="$store.mixer.updatePreviewCount(block)">
                                <input type="range" min="1920" :max="new Date().getFullYear()" x-model.number="block.filters.year_to" @input.debounce.500ms="$store.mixer.updatePreviewCount(block)">
                            </div>
                            <p class="text-subtle mt-xs" style="font-size: 0.75rem;" x-show="block.filters.release_within_days > 0">Year Range is disabled while "Release Within" is active.</p>
                        </div>

                        <div class="flex-row flex-wrap gap-xs mb-md">
                            <template x-for="lib in $store.mixer.library.libraryData" :key="block._uid + '_lib_sel_' + lib.Id">
                                <button type="button" class="pill-btn p-sm" style="font-size: 0.85rem;" :class="(block.filters?.parent_ids || []).includes(lib.Id) ? 'active' : ''" @click="if(!block.filters.parent_ids) block.filters.parent_ids = []; if(block.filters.parent_ids.includes(lib.Id)) { block.filters.parent_ids = block.filters.parent_ids.filter(id => id !== lib.Id) } else { block.filters.parent_ids.push(lib.Id) }; $store.mixer.updatePreviewCount(block);" x-text="lib.Name"></button>
                            </template>
                        </div>
                        <div class="movie-block-filter-grid">
                            <button type="button" class="filter-toggle-btn align-center gap-xs" @click="cycleWatchedStatus()">
                                <span x-html="(block.filters && block.filters.watched_status === 'unplayed') ? $store.icons.eyeOff : $store.icons.eye"></span>
                                <span x-text="(block.filters && block.filters.watched_status === 'unplayed') ? 'Unplayed' : ((block.filters && block.filters.watched_status === 'played') ? 'Played' : 'All Movies')"></span>
                            </button>
                            <button type="button" class="filter-toggle-btn align-center gap-xs" @click="cycleSort()">
                                <span x-html="(block.filters && block.filters.sort_by === 'PremiereDate') ? $store.icons.calendar : $store.icons.shuffle"></span>
                                <span x-text="'Sort: ' + ((block.filters && block.filters.sort_by) || 'Random')"></span>
                            </button>
                        </div>
                    </fieldset>
                </div>
                <div class="modal-footer"><button type="button" @click="filterModalOpen = false" class="primary">Done</button></div>
            </div>
        </div>
    </div>
</template>
