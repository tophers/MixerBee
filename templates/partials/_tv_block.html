<template x-if="block && block.type === 'tv'">
    <div x-data="{ editModalOpen: false }" x-init="$store.mixer.ensureBlockState(block)">
        <details class="mixed-block" :open="index === $store.mixer.blocks.length - 1">
            <summary>
                <div class="mixed-block-header">
                    <button type="button" class="icon-btn drag-handle"><i data-feather="move"></i></button>
                    <h3>
                        <template x-if="block.is_ai_generated"><i data-feather="zap" class="ai-badge-icon"></i></template>
                        <span x-text="block.title || 'TV Block'"></span>
                    </h3>
                    <div class="mixed-block-controls dropdown-container" x-data="{ menuOpen: false }">
                        <button type="button" class="icon-btn" @click.prevent="menuOpen = !menuOpen" @click.outside="menuOpen = false"><i data-feather="more-vertical"></i></button>
                        <div class="dropdown-menu" x-show="menuOpen" x-cloak style="right: 0; left: auto; top: 100%; z-index: 10;">
                            <a href="#" class="dropdown-item" @click.prevent="menuOpen = false; $store.mixer.duplicateBlock(index)"><i data-feather="copy"></i> Duplicate</a>
                            <a href="#" class="dropdown-item" @click.prevent="menuOpen = false; $store.mixer.deleteBlock(index)" style="color: var(--danger);"><i data-feather="trash-2"></i> Delete</a>
                        </div>
                        <span class="icon-btn collapse-toggle-btn" style="margin-left: 0.5rem;"><i data-feather="chevron-up"></i></span>
                    </div>
                </div>
            </summary>

            <div class="mixed-block-body">
                <div class="block-summary-card">
                    <div class="summary-label">Shows Included</div>
                    <div class="summary-content" x-text="$store.mixer.getTvShowList(block)"></div>
                    <div class="summary-footer mt-md">
                        <span class="badge" x-text="$store.mixer.getTvBlockSummary(block)"></span>
                        <button type="button" class="secondary small" @click="editModalOpen = true" style="margin-left: auto;"><i data-feather="edit-3"></i> Edit Shows</button>
                    </div>
                </div>
            </div>
        </details>

        <div class="modal-overlay" x-show="editModalOpen" x-cloak style="z-index: 4000; position: fixed;">
            <div class="modal-window wide" @click.outside="editModalOpen = false">
                <div class="modal-header">
                    <h2>Edit TV Block</h2>
                    <button type="button" class="icon-btn" @click="editModalOpen = false">&times;</button>
                </div>
                <div class="modal-body">
                    <!-- General Settings -->
                    <div class="modal-form-layout mb-lg">
                        <label class="control-item">
                            <span>Block Title</span>
                            <input type="text" x-model="block.title" placeholder="e.g., Evening Comedy">
                        </label>
                        
                        <div class="control-item">
                            <span>Episode Ordering</span>
                            <div class="toggle-pill w-full" style="display: flex; width: 100%;">
                                <span class="pill-btn" style="flex: 1; text-align: center;" :class="block.interleave ? 'active' : ''" @click="block.interleave = true">Interleaved</span>
                                <span class="pill-btn" style="flex: 1; text-align: center;" :class="!block.interleave ? 'active' : ''" @click="block.interleave = false">Sequential</span>
                            </div>
                        </div>

                        <div class="control-item">
                            <span>Episodes per show</span>
                            <div class="flex-column gap-sm">
                                <div class="toggle-pill w-full" style="display: flex; width: 100%;">
                                    <!-- Preset Pills -->
                                    <template x-for="val in [2,3,4,5]">
                                        <span class="pill-btn" 
                                              style="flex: 1; text-align: center;"
                                              :class="block.count === val ? 'active' : ''" 
                                              @click="block.count = val" 
                                              x-text="val"></span>
                                    </template>
                                    <!-- Custom Pill -->
                                    <span class="pill-btn" 
                                          style="flex: 1; text-align: center;"
                                          :class="![2,3,4,5].includes(block.count) ? 'active' : ''" 
                                          @click="if([2,3,4,5].includes(block.count)) block.count = 6">Custom</span>
                                </div>
                                <!-- Manual input only visible if count isn't a preset -->
                                <div x-show="![2,3,4,5].includes(block.count)" 
                                     class="flex-row align-center gap-md"
                                     style="margin-top: 4px;">
                                    <span class="text-subtle" style="font-size: 0.85rem;">Custom Count:</span>
                                    <input type="number" 
                                           x-model.number="block.count" 
                                           min="1" max="100" 
                                           class="m-0"
                                           style="width: 80px; height: 32px;">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Added x-effect here to refresh icons when rows are added or removed -->
                    <div class="tv-block-shows" 
                         x-init="$store.mixer.setupSortable($el, 'tv-shows', index)"
                         x-effect="block.shows.length; $nextTick(() => window.featherReplace())">
                        <template x-for="(show, rowIndex) in block.shows" :key="show._uid">
                            <div class="tv-block-show-row" 
                                 :class="{ 'is-unwatched': show.unwatched }" 
                                 x-data="{ rowMenuOpen: false }"
                                 style="display: flex; align-items: flex-start; gap: 0.5rem; padding: 1rem 0; border-bottom: 1px solid var(--border-color);">
                                
                                <div class="drag-handle" style="margin-top: 8px;"><i data-feather="menu"></i></div>
                                
                                <div class="show-selector-area" style="flex-grow: 1;">
                                    <div class="show-input-wrapper">
                                        <select class="w-full" 
                                                x-model="show.name" 
                                                @change="show.unwatched ? $store.mixer.syncNextUnwatched(show) : $store.mixer.fetchEpisodeTitle(show)">
                                            <option value="">-- Select a show --</option>
                                            <template x-for="s in $store.mixer.library.seriesData" :key="s.id">
                                                <option :value="s.name" x-text="s.name"></option>
                                            </template>
                                        </select>
                                    </div>
                                    <div class="show-episode-config" x-show="show.name" style="margin-top: 0.75rem;">
                                        <div class="toggle-pill mb-sm" style="display: flex; width: 100%;">
                                            <span class="pill-btn" style="flex: 1; text-align: center;" :class="show.unwatched ? 'active' : ''" 
                                                  @click="show.unwatched = true; $store.mixer.syncNextUnwatched(show)">Next Unwatched</span>
                                            <span class="pill-btn" style="flex: 1; text-align: center;" :class="!show.unwatched ? 'active' : ''" 
                                                  @click="show.unwatched = false; $store.mixer.fetchEpisodeTitle(show)">Manual</span>
                                        </div>

                                        <div class="episode-inputs flex-row gap-md align-center" x-show="!show.unwatched" style="margin-bottom: 0.5rem;">
                                            <div class="flex-row align-center gap-xs">
                                                <span class="text-subtle" style="font-size: 0.85rem;">Season:</span>
                                                <input type="number" x-model.number="show.season" min="1" @change="$store.mixer.fetchEpisodeTitle(show)" style="width: 65px;">
                                            </div>
                                            <div class="flex-row align-center gap-xs">
                                                <span class="text-subtle" style="font-size: 0.85rem;">Episode:</span>
                                                <input type="number" x-model.number="show.episode" min="1" @change="$store.mixer.fetchEpisodeTitle(show)" style="width: 65px;">
                                            </div>
                                        </div>
                                        <div class="episode-title-preview" x-show="show.previewTitle" style="font-size: 0.9rem; opacity: 0.8;">
                                            <span>Title: </span><i x-text="show.previewTitle"></i>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="row-actions flex-row gap-xs" style="margin-top: 6px;">
                                    <div class="dropdown-container">
                                        <button type="button" class="icon-btn" @click="rowMenuOpen = !rowMenuOpen" @click.outside="rowMenuOpen = false">
                                            <i data-feather="more-horizontal"></i>
                                        </button>
                                        <div class="dropdown-menu" x-show="rowMenuOpen" x-cloak style="right: 0; left: auto; top: 100%;">
                                            <a href="#" class="dropdown-item" @click.prevent="rowMenuOpen = false; $store.mixer.promptResetWatch(show)">
                                                <i data-feather="refresh-cw"></i> Reset Watch State
                                            </a>
                                        </div>
                                    </div>
                                    <button type="button" class="icon-btn danger-hover" 
                                            @click="$store.mixer.deleteShowRow(index, rowIndex)"
                                            title="Remove Series">
                                        <i data-feather="trash-2"></i>
                                    </button>
                                </div>
                            </div>
                        </template>
                    </div>
                    <button type="button" class="secondary" style="width: 100%; margin-top: 1rem;" @click="$store.mixer.addShowRow(index)">+ Add Series</button>
                </div>
                <div class="modal-footer">
                    <button type="button" class="primary" @click="editModalOpen = false">Done</button>
                </div>
            </div>
        </div>
    </div>
</template>
