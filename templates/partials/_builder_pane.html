<!-- templates/partials/_builder_pane.html -->
<div id="mixed-pane">
    <div class="container">
        <div class="preset-controls" x-data="{ presetMenuOpen: false }">

            <div style="display: flex; gap: 0.5rem; align-items: flex-end; flex-grow: 1;">
                <label class="control-item grow-1 m-0" for="load-preset-select">
                    <div class="flex-row justify-between">
                        <span>Load Preset</span>
                        <span class="badge badge-outline-subtle" style="font-size: 0.65rem;" x-text="$store.presets.availableNames.length + ' saved'"></span>
                    </div>
                    <select id="load-preset-select"
                            class="w-full m-0"
                            x-model="$store.presets.currentName"
                            @change="$store.presets.load($el.value)">
                        <option value="">-- Select a preset --</option>
                        <template x-for="name in $store.presets.availableNames" :key="name">
                            <option :value="name" x-text="name"></option>
                        </template>
                    </select>
                </label>

                <div class="dropdown-container shrink-0">
                    <button type="button" class="secondary icon-only m-0" @click="presetMenuOpen = !presetMenuOpen" @click.outside="presetMenuOpen = false">
                        <span x-html="$store.icons.more"></span>
                    </button>

                    <div class="dropdown-menu" x-show="presetMenuOpen" x-cloak style="right: 0; left: auto; top: 100%; z-index: 100;">
                        <a href="#" class="dropdown-item" x-show="$store.presets.currentName" @click.prevent="presetMenuOpen = false; $store.presets.updateCurrent()">
                            <span class="dropdown-icon" x-html="$store.icons.save"></span> Save
                        </a>
                        <a href="#" class="dropdown-item" x-show="!$store.presets.currentName" @click.prevent="presetMenuOpen = false; $store.presets.saveAs()">
                            <span class="dropdown-icon" x-html="$store.icons.save"></span> Save as Preset...
                        </a>
                        <a href="#" class="dropdown-item" @click.prevent="presetMenuOpen = false; $store.presets.import()">
                            <span class="dropdown-icon" x-html="$store.icons.download"></span> Import
                        </a>
                        <a href="#" class="dropdown-item" :class="{ 'opacity-60': !$store.presets.currentName }" @click.prevent="if($store.presets.currentName) { presetMenuOpen = false; $store.presets.exportCurrent(); }">
                            <span class="dropdown-icon" x-html="$store.icons.upload"></span> Export
                        </a>
                        <a href="#" class="dropdown-item danger-hover" style="color: var(--danger);" x-show="$store.presets.currentName" @click.prevent="presetMenuOpen = false; $store.presets.deleteCurrent()">
                            <span class="dropdown-icon" x-html="$store.icons.trash"></span> Delete
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <fieldset id="ai-generator-container" class="filter-group" x-data x-show="$store.settings.is_ai_configured && $store.ui.showAiBuilder" x-transition x-cloak>
            <div class="flex-row justify-between align-center mb-sm">
                <legend class="m-0" style="padding: 0; margin-left: 0.5rem;">AI Block Builder</legend>
                <button type="button" class="icon-btn" @click="$store.ui.showAiBuilder = false" title="Close AI Builder" style="font-size: 1.5rem;">
                    &times;
                </button>
            </div>
            
            <div x-init="$store.mixer.fetchMoodDiscovery()">
                <div class="textarea-wrapper">
                    <textarea id="ai-prompt-input" rows="2" placeholder="e.g., Gritty, neon-drenched 90s cyberpunk thrillers, followed by 3 episodes of The Twilight Zone" x-model="$store.mixer.aiPrompt"></textarea>
                    <button type="button" class="icon-btn clear-btn" title="Clear text" x-cloak x-show="$store.mixer.aiPrompt.length > 0" @click="$store.mixer.clearAiPrompt()">
                        <span x-html="$store.icons.xCircle"></span>
                    </button>
                </div>
                
                <!-- Mood Discovery Slots -->
                <div class="mood-discovery-bar flex-row align-center gap-xs" x-show="$store.mixer.activeMoods.length > 0" x-transition>
                    <span class="text-subtle mr-xs hide-mobile" style="font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em;">Mood: </span>
                    <div class="flex-row gap-xs grow-1 overflow-hidden">
                        <template x-for="(mood, i) in $store.mixer.activeMoods" :key="'mood-'+i">
                            <button type="button" 
                                    class="mood-slot-btn" 
                                    @click="$store.mixer.appendMood(i)"
                                    title="Click to add to prompt">
                                <span class="mood-slot-text" x-text="mood"></span>
                            </button>
                        </template>
                    </div>
                    <button type="button" 
                            class="icon-btn mood-refresh-btn" 
                            @click="$store.mixer.refreshMoodSlots()" 
                            :class="$store.mixer.isMoodLoading ? 'spin' : ''"
                            title="Refresh Moods">
                        <span x-html="$store.icons.refresh" style="--icon-size: 14px;"></span>
                    </button>
                </div>
                <div class="prompt-starter-overlay" x-show="$store.mixer.aiPrompt.length === 0 && $store.mixer.samplePrompt" x-transition x-cloak>
                    <span class="text-subtle hide-mobile" style="font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em;">Try: </span>
                    <button type="button" class="link-btn mood-discovery-bar" @click="$store.mixer.useSamplePrompt()" x-text="$store.mixer.samplePrompt"></button>
                </div> 

                <div class="ai-prompt-footer" style="display: flex; justify-content: space-between; align-items: center; margin-top: 0.75rem;">
                    
                    <div class="dropdown-container" x-data="{ modelMenuOpen: false }">
                        <button type="button" class="badge badge-outline-subtle align-center gap-xs m-0" 
                                style="font-size: 0.7rem; opacity: 0.9; font-weight: 600; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);"
                                @click="modelMenuOpen = !modelMenuOpen" @click.outside="modelMenuOpen = false">
                            <span x-html="$store.icons.zap" :style="$store.settings.ai_provider === 'ollama' ? 'color: var(--accent);' : 'color: #4285F4;'"></span>
                            <span x-text="$store.settings.ai_provider === 'ollama' ? 'OLLAMA: ' + $store.settings.ollama_model.toUpperCase() : 'GOOGLE GEMINI'"></span>
                            <span x-show="$store.settings.ai_provider === 'ollama'" x-html="$store.icons.chevronDown" style="font-size: 0.6rem; opacity: 0.5;"></span>
                        </button>

                        <div class="dropdown-menu dropdown-up" x-show="modelMenuOpen" x-cloak style="min-width: 200px;">
                            <template x-if="$store.settings.ai_provider === 'gemini'">
                                <div class="dropdown-item opacity-60 italic" style="font-size: 0.8rem;">Switching Gemini models requires Settings.</div>
                            </template>
                            
                            <template x-if="$store.settings.ai_provider === 'ollama'">
                                <div>
                                    <template x-for="m in $store.settings.starred_models" :key="'quick-'+m">
                                        <a href="#" class="dropdown-item flex-row justify-between align-center" @click.prevent="modelMenuOpen = false; $store.mixer.quickSwitchModel(m)">
                                            <span class="flex-row align-center gap-xs">
                                                <span class="running-indicator" x-show="$store.settings.ollama_running.includes(m)"></span>
                                                <span x-text="m" :class="$store.settings.ollama_model === m ? 'bold color-accent' : ''"></span>
                                            </span>
                                            <span style="color: var(--accent); font-size: 0.7rem;">★</span>
                                        </a>
                                    </template>
                                    <div class="divider"></div>
                                    <a href="#" class="dropdown-item text-subtle" @click.prevent="modelMenuOpen = false; $store.settings.show()">
                                        <span class="dropdown-icon" x-html="$store.icons.settings"></span> Manage Models...
                                    </a>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div class="flex-row gap-xs">
                        <button type="button" class="secondary icon-only m-0" title="Advanced AI Settings" @click="$store.modals.aiTweaksAction.show()">
                            <span x-html="$store.icons.sliders"></span>
                        </button>
                        <button id="generate-with-ai-btn" type="button" class="secondary m-0" @click="$store.mixer.generateWithAi()" :disabled="$store.mixer.isAiGenerating">
                            <span x-text="$store.mixer.isAiGenerating ? 'Thinking...' : 'Generate with AI'"></span>
                        </button>
                    </div>
                </div>
            </div>
        </fieldset>

        <div id="mixed-playlist-blocks" 
             x-sort="$store.mixer.blocks" 
             x-sort:config="{ handle: '.block-drag-handle' }"
             @sort="$store.mixer.syncOrderFromDom($el)">
            <p class="placeholder-text" x-show="$store.mixer.blocks.length === 0">
                Click <strong>'Add Block'</strong> below to begin building your mix, <br>
                or try <strong>'Auto Playlists'</strong> for a quick start.
            </p>

            <template x-for="(block, index) in $store.mixer.blocks" :key="block._uid">
                <div class="block-wrapper" x-sort:item :data-uid="block._uid">
                    {% include 'partials/_tv_block.html' %}
                    {% include 'partials/_movie_block.html' %}
                    {% include 'partials/_music_block.html' %}
                    {% include 'partials/_vibe_block.html' %}
                    {% include 'partials/_mirror_block.html' %}
                </div>
            </template>
        </div>
    </div>
</div>

<div id="action-bar" x-show="$store.ui.currentTab === 'mixed'">
    <div class="action-bar-content action-bar-stack">
        <div class="action-bar-row">
            <div class="button-group flex-wrap grow-1">
                <div class="dropdown-container" x-data="{ open: false }">
                    <button class="secondary m-0 align-center gap-xs" @click="open = !open" @click.outside="open = false">
                        <span x-html="$store.icons.plus"></span><span class="hide-mobile">Add Block</span><span class="chevron hide-mobile" x-html="$store.icons.chevronDown"></span>
                    </button>
                    <div class="dropdown-menu dropdown-up" x-show="open" x-cloak @click.outside="open = false">
                        <a href="#" class="dropdown-item" @click.prevent="open = false; $store.mixer.addBlock('mirror')"><span class="dropdown-icon" x-html="$store.icons.shuffle"></span> Echo Block</a>
                        <a href="#" class="dropdown-item" @click.prevent="open = false; $store.mixer.addBlock('tv')"><span class="dropdown-icon" x-html="$store.icons.tv"></span> TV Block</a>
                        <a href="#" class="dropdown-item" @click.prevent="open = false; $store.mixer.addBlock('movie')"><span class="dropdown-icon" x-html="$store.icons.film"></span> Movie Block</a>
                        <a href="#" class="dropdown-item" @click.prevent="open = false; $store.mixer.addBlock('music')"><span class="dropdown-icon" x-html="$store.icons.music"></span> Music Block</a>
                    </div>
                </div>
                
                <button type="button" class="secondary m-0 align-center gap-xs" x-show="$store.settings.is_ai_configured" @click="$store.ui.showAiBuilder = !$store.ui.showAiBuilder">
                    <span x-html="$store.icons.zap"></span> <span class="hide-mobile">AI Builder</span>
                </button>
                
                <button type="button" class="secondary m-0 align-center gap-xs" @click="$store.mixer.showSmartBuildMenu()"><span x-html="$store.icons.framer"></span> <span class="hide-mobile">Auto Playlists</span></button>
                <button type="button" class="secondary m-0 align-center gap-xs" @click="$store.mixer.previewPlaylist($el)"><span x-html="$store.icons.search"></span> <span class="hide-mobile">Preview</span></button>
            </div>
            <button type="button" class="secondary btn-danger-outline m-0 align-center gap-xs" title="Clear All Blocks" @click="$store.mixer.clearAllBlocks()"><span x-html="$store.icons.trash"></span> <span class="hide-mobile">Clear All</span></button>
        </div>
        <div class="action-bar-footer">
            <div class="flex-row gap-sm grow-1 align-center">
                <select x-model="$store.mixer.buildMode" class="m-0" style="max-width: 150px; flex-grow: 1;" @change="if($el.value === 'add') $store.mixer.refreshUserPlaylists()">
                    <option value="create">New</option>
                    <option value="add">Append</option>
                </select>
                <div class="toggle-pill action-bar-pill flex-basis-sync" x-show="$store.mixer.buildMode === 'create'" x-cloak>
                    <span class="pill-btn" :class="!$store.mixer.createAsCollection ? 'active' : ''" @click="$store.mixer.createAsCollection = false">Playlist</span>
                    <span class="pill-btn" :class="$store.mixer.createAsCollection ? 'active' : ''" @click="$store.mixer.createAsCollection = true">Collection</span>
                </div>
                <select x-model="$store.mixer.existingPlaylistId" x-cloak x-show="$store.mixer.buildMode === 'add'" class="m-0 grow-1 flex-basis-sync" style="min-width: 0;">
                    <option value="">-- Target --</option>
                    <template x-for="p in $store.mixer.userPlaylists" :key="p.Id"><option :value="p.Id" x-text="p.Name"></option></template>
                </select>
            </div>
            <button class="m-0" style="min-width: 100px;" @click="$store.mixer.buildPlaylist($el)">
                Build
            </button>
        </div>
    </div>
</div>
